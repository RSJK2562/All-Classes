{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <!-- Header -->
            <div class="card-header bg-primary text-white">

                <h3>
                    <i class="bi bi-pencil-square"></i>
                    Edit Student
                </h3>

            </div>

            <!-- Body -->
            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <!-- Name -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Student Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ student.name }}">

                    </div>

                    <!-- Email -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ student.email }}">

                    </div>

                    <!-- DOB -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Date of Birth
                        </label>

                        <input type="date"
                               name="dob"
                               class="form-control"
                               value="{{ student.dob|date:'Y-m-d' }}">

                    </div>

                    <!-- Gender -->
                    <div class="mb-3">

                        <label class="form-label fw-bold d-block">
                            Gender
                        </label>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="radio"
                                   name="gender"
                                   value="Male"

                                   {% if student.gender == 'Male' %}
                                   checked
                                   {% endif %}>

                            <label class="form-check-label">
                                Male
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="radio"
                                   name="gender"
                                   value="Female"

                                   {% if student.gender == 'Female' %}
                                   checked
                                   {% endif %}>

                            <label class="form-check-label">
                                Female
                            </label>

                        </div>

                    </div>

                    <!-- Course -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Course
                        </label>

                        <select class="form-select" name="course">

                            <option selected disabled>
                                Select Course
                            </option>

                            <option value="Python Django"
                                {% if student.course == 'Python Django' %}selected{% endif %}>
                                Python Django
                            </option>

                            <option value="Data Science"
                                {% if student.course == 'Data Science' %}selected{% endif %}>
                                Data Science
                            </option>

                            <option value="Machine Learning"
                                {% if student.course == 'Machine Learning' %}selected{% endif %}>
                                Machine Learning
                            </option>

                            <option value="Web Development"
                                {% if student.course == 'Web Development' %}selected{% endif %}>
                                Web Development
                            </option>

                        </select>

                    </div>

                    <!-- Hobbies -->
                    <div class="mb-3">

                        <label class="form-label fw-bold d-block">
                            Hobbies
                        </label>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                               type="checkbox"
                               name="hobbies"
                               value="Reading"
                               {% if is_reading %}checked{% endif %}>

                            <label class="form-check-label">
                                Reading
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                               type="checkbox"
                               name="hobbies"
                               value="Coding"
                               {% if is_coding %}checked{% endif %}>

                            <label class="form-check-label">
                                Coding
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                               type="checkbox"
                               name="hobbies"
                               value="Gaming"
                               {% if is_gaming %}checked{% endif %}>

                            <label class="form-check-label">
                                Gaming
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                               type="checkbox"
                               name="hobbies"
                               value="Traveling"
                               {% if is_traveling %}checked{% endif %}>

                            <label class="form-check-label">
                                Traveling
                            </label>

                        </div>

                    </div>

                    <!-- Address -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Address
                        </label>

                        <textarea name="address"
                                  class="form-control"
                                  rows="4">{{ student.address }}</textarea>

                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between">

                        <a href="/"
                           class="btn btn-secondary">

                            Back

                        </a>

                        <button type="submit"
                                class="btn btn-primary">

                            Update Student

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
