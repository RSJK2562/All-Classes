{% extends 'base.html' %}

{% load static %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="text-center">
            <a href="/">
                <img src="{% static 'images/student.png' %}" width="50" class="rounded-circle shadow mb-4">
            </a>
        </div>

        <div class="card shadow border-0">

            <div class="card-header bg-success text-white">
                <h5>
                    <i class="bi bi-person-plus-fill"></i>
                    Add Student
                </h5>
            </div>

            <div class="card-body">

                <form method="POST">
                    {% csrf_token %}

                    <!-- Student Name -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Student Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Enter student name">

                    </div>

                    <!-- Email -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Email Address
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter email">

                    </div>

                    <!-- DOB -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Date of Birth
                        </label>

                        <input type="date"
                               name="dob"
                               class="form-control">

                    </div>

                    <!-- Gender -->
                    <div class="mb-3">

                        <label class="form-label fw-bold d-block">
                            Gender
                        </label>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="radio"
                                   name="gender"
                                   value="Male">

                            <label class="form-check-label">
                                Male
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="radio"
                                   name="gender"
                                   value="Female">

                            <label class="form-check-label">
                                Female
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="radio"
                                   name="gender"
                                   value="Other">

                            <label class="form-check-label">
                                Other
                            </label>

                        </div>

                    </div>

                    <!-- Course -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Course
                        </label>

                        <select class="form-select" name="course">

                            <option selected disabled>
                                Select Course
                            </option>

                            <option value="Python Django">Python Django</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Machine Learning">Machine Learning</option>
                            <option value="Web Development">Web Development</option>

                        </select>

                    </div>

                    <!-- Hobbies -->
                    <div class="mb-3">

                        <label class="form-label fw-bold d-block">
                            Hobbies
                        </label>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="hobbies"
                                   value="Reading">

                            <label class="form-check-label">
                                Reading
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="hobbies"
                                   value="Coding">

                            <label class="form-check-label">
                                Coding
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="hobbies"
                                   value="Gaming">

                            <label class="form-check-label">
                                Gaming
                            </label>

                        </div>

                        <div class="form-check form-check-inline">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="hobbies"
                                   value="Traveling">

                            <label class="form-check-label">
                                Traveling
                            </label>

                        </div>

                    </div>

                    <!-- Address -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Address
                        </label>

                        <textarea class="form-control"
                                  rows="4"
                                  name="address"
                                  placeholder="Enter full address"></textarea>

                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between">

                        <!-- Back Button -->
                        <a href="/"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>
                            Back

                        </a>

                        <!-- Save Button -->
                        <button type="submit"
                                class="btn btn-success">

                            <i class="bi bi-save"></i>
                            Save Student

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
