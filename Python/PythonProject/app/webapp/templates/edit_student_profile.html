{% extends 'base.html' %}

{% load static %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <!-- Header -->
            <div class="card-header bg-primary text-white">

                <h3>
                    <i class="bi bi-pencil-square"></i>
                    Edit Student Profile
                </h3>

            </div>

            <!-- Body -->
            <div class="card-body">

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- Student Name -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Student
                        </label>

                        <select class="form-select" name="student_id">

                            <option selected disabled>
                                    Select Name
                            </option>

                            {% for student in students %}

                                <option value="{{ student.id }}"
                                    {% if student.id == profile.student.id %}
                                        selected
                                    {% endif %}>

                                    {{ student.name }}

                                </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Change Photo
                        </label>

                        <input type="file"
                               name="profile"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Current Photo
                        </label>

                        <br>

                        <img src="{{ profile.profile.url }}"
                             width="120"
                             class="img-thumbnail">

                    </div>


                    <!-- Buttons -->
                    <div class="d-flex justify-content-between">

                        <a href="{% url 'student_profile' %}"
                           class="btn btn-secondary">

                            Back

                        </a>

                        <button type="submit"
                                class="btn btn-primary">

                            Update Profile

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
