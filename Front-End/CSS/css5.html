<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Shadow Effect</title>

    <style>
        .box {
            height: 200px;
            width: 200px;
            border-radius: 20px;

            background: lightblue;

            margin: 50px;

            /* Basic Shadow */
            /* box-shadow: 5px 5px 10px gray; */

            /* 5px → right
            5px → down
            10px → blur
            gray → shadow color */

            /* Soft Shadow */
            /* box-shadow: 0px 4px 15px rgba(0,0,0,0.2); */


            /* Inner Shadow (inset) */
            /* box-shadow: inset 5px 5px 10px gray; */


            /* Double Shadow */
            box-shadow:
                5px 5px 10px gray,
                -5px -5px 10px lightgray;

        }
    </style>
</head>

<body>
    <div class="box"></div>
</body>

</html>
