<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1::after {
            /* content: ' Coders!'; */

            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: green;
        }

        h2::before {
            /* content: 'Hello '; */

            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: red;
        }
    </style>
</head>

<body>
    <h1>Hello</h1>
    <h2>Coders!</h2>

</body>

</html>
