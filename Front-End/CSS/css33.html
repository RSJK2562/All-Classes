<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        /* NAVBAR */

        nav {
            background: #222;
            color: white;
            padding: 15px 30px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        /* HERO SECTION */

        .hero {
            min-height: 90vh;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .hero p {
            max-width: 700px;
            font-size: 20px;
            line-height: 1.6;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        /* CARDS */

        .container {
            width: 90%;
            margin: auto;
            padding: 50px 0;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);

            text-align: center;
        }

        .card h2 {
            margin-bottom: 15px;
        }

        /* FOOTER */

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* RESPONSIVE */

        @media(max-width:768px) {

            .hero h1 {
                font-size: 40px;
            }

            .hero p {
                font-size: 18px;
            }

            nav {
                justify-content: center;
                gap: 15px;
            }

        }

        @media(max-width:480px) {

            .hero h1 {
                font-size: 30px;
            }

            .hero p {
                font-size: 16px;
            }

            .menu {
                justify-content: center;
            }

            .btn {
                width: 100%;
            }

        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav>
        <div class="logo">MySite</div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- HERO -->

    <section class="hero">

        <h1>Responsive Website</h1>

        <p>
            This layout automatically adjusts for mobile,
            tablet, laptop, and desktop devices.
        </p>

        <button class="btn">Get Started</button>

    </section>

    <!-- CARDS -->

    <section class="container">

        <div class="card">
            <h2>Card 1</h2>
            <p>Responsive Grid Layout</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>Works on all devices</p>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>Mobile Friendly Design</p>
        </div>

    </section>

    <!-- FOOTER -->

    <footer>
        © 2026 Responsive Website
    </footer>

</body>

</html>
