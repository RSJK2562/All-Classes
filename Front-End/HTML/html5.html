<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Tag</title>
</head>

<body>
    <form>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter full name" value="hello" readonly>
        <br><br>
        <label for="">Email</label>
        <input type="email" placeholder="Enter email" required>
        <br><br>
        <label for="">Phone</label>
        <input type="number" placeholder="Enter phone no" disabled>
        <br><br>
        <label for="">Color</label>
        <input type="color">
        <br><br>
        <label for="">Gender</label>
        <br>
        <input type="radio" name="gender" checked> Male
        <input type="radio" name="gender"> Female
        <br><br>
        <label for="">Class</label>
        <br>
        <input type="checkbox" checked> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JS
        <input type="checkbox"> C
        <br><br>
        <input type="range">
        <br><br>
        <label for="">City</label>
        <select>
            <option value="">Select City</option>
            <option value="">Noida</option>
            <option value="">Lucknow</option>
            <option value="">Kanpur</option>
            <option value="" selected>Varanshi</option>
        </select>
        <br><br>
        <label for="">Message</label>
        <br>
        <textarea cols="30" rows="8"></textarea>

        <br><br>
        <!--  -->
        <input type="submit" value="Save Data">
        <input type="reset">
        <br><br>
        <button type="button">Save</button>
        <hr>
        <label for="">Date</label>
        <input type="date">
        <br><br>
        <label for="">Time</label>
        <input type="time">
        <br><br>
        <input type="datetime-local">
        <br><br>
        <label for="">Password</label>
        <input type="password">
        <br><br>
        <label for="">Week</label>
        <input type="week">
        <br><br>
        <label for="">File</label>
        <input type="file">
        <br><br>
        <label for="">Hidden</label>
        <input type="hidden">
    </form>
</body>

</html>
