<!DOCTYPE html>
<html>

<head>
    <title>HTML Marquee Tag</title>
</head>

<body>

    <h1>HTML Marquee Tag</h1>

    <p>
        The &lt;marquee&gt; tag is used to create moving text or images.
    </p>

    <hr>

    <marquee behavior="alternate" direction="right">
        <h1>Mr Coder!</h1>
    </marquee>
    <br>

    <marquee behavior="alternate" direction="down" bgcolor="lime" width="20%" height="200px" onmouseover="this.stop()"
        onmouseleave="this.start()" scrollamount="10">
        <h1>Mr Coder!</h1>
    </marquee>

</body>

</html>
