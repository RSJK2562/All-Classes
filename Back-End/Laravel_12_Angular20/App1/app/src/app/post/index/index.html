<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="card mt-5">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">CRUD APP</h2>
                    <a [routerLink]="['/post/create']" routerLinkActive="router-link-active"
                        class="btn btn-success">Create Post</a>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Body</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (item of posts; track $index) {
                            <tr>
                                <td>{{ $index+1}}</td>
                                <td>{{item.title}}</td>
                                <td>{{item.body}}</td>
                                <td>
                                    <a [routerLink]="['/post', item.id]" class="btn btn-sm btn-primary mx-1">Edit</a>
                                    <a [routerLink]="['/view', item.id]" class="btn btn-sm btn-success mx-1">View</a>
                                    <button (click)="deletePost(item.id)" class="btn btn-sm btn-danger mx-1">Delete</button>
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
