<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="card mt-5">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2 class="card-title mb-0">Post Details</h2>
                    <button class="btn btn-secondary" (click)="goBack()">Go Back</button>
                </div>
                <div class="card-body">

                </div>
            </div>
        </div>
    </div>
</div>
